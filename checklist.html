<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Session Prep TODO</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --border: #334155;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      --toolbar-height: 54px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .toolbar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: min(900px, 100vw);
      height: var(--toolbar-height);
      display: flex;
      align-items: center;
      padding: 8px 14px;
      
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .progress-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.2s ease;
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding-top: calc(var(--toolbar-height) + 10px);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.35);
    }

    .section {
      padding: 24px 28px;
      border-top: 1px solid rgba(51, 65, 85, 0.55);
      scroll-margin-top: calc(var(--toolbar-height) + 20px);
    }

    .section:first-of-type {
      border-top: none;
    }

    .section-body {
      display: grid;
      gap: 14px;
    }

    .section.is-collapsed .section-body {
      display: none;
    }

    .section h2 {
      margin: 0;
      font-size: 1.2rem;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .section-toggle,
    .item-toggle {
      border: 1px solid var(--border);
      background: rgba(30, 41, 59, 0.8);
      color: var(--text);
      border-radius: 10px;
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-size: 1rem;
      flex: 0 0 auto;
    }

    .section-toggle:hover,
    .item-toggle:hover {
      background: rgba(51, 65, 85, 0.95);
      transform: none;
    }

    .section-toggle:active,
    .item-toggle:active {
      transform: none;
    }

    .situations-list,
    .checklist,
    .situation-grid {
      display: grid;
      gap: 12px;
    }

    .situation-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.45);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .situation-card.done {
      border-color: rgba(34, 197, 94, 0.35);
    }

    .situation-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .situation-top-left {
      display: grid;
      gap: 4px;
      width: 100%;
    }

    .sub-item {
      margin: 0;
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 0.88rem;
      flex: 0 0 auto;
    }

    label.item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.55);
      cursor: pointer;
      width: 100%;
      position: relative;
      padding-right: 58px;
    }

    label.item:hover {
      background: rgba(30, 41, 59, 0.7);
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--accent-2);
      flex: 0 0 auto;
    }

    .item-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      min-width: 0;
    }

    .item.is-collapsed .item-note,
    .item.is-collapsed .text-input,
    .item.is-collapsed .text-area {
      display: none;
    }

    .item-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
    }

    .item-title {
      font-weight: 600;
      line-height: 1.35;
    }

    .item-note {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.4;
    }

    .text-input,
    .text-area {
      display: block;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      font-size: 0.95rem;
      width: 100%;
      max-width: 100%;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.18);
    }

    .text-input { min-height: 44px; }

    .text-area {
      min-height: 140px;
      resize: vertical;
      line-height: 1.45;
    }

    .text-input::placeholder,
    .text-area::placeholder {
      color: #64748b;
    }

    .text-input:hover,
    .text-area:hover {
      background: #06101f;
      border-color: #475569;
    }

    .text-input:focus,
    .text-area:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16), inset 0 1px 2px rgba(0, 0, 0, 0.18);
      background: #081223;
    }

    .done .item-title,
    .done .item-note {
      opacity: 0.72;
    }

    .done .item-title {
      text-decoration: line-through;
    }

    @media (max-width: 640px) {
      :root {
        --toolbar-height: 54px;
      }

      body { padding: 12px; }

      .toolbar {
        width: 100vw;
        padding: 8px 12px;
      }

      .card {
        padding-top: calc(var(--toolbar-height) + 10px);
      }

      .section {
        padding-left: 16px;
        padding-right: 16px;
      }

      .buttons {
        flex-direction: column;
      }

      .buttons button {
        width: 100%;
      }

      .section-head {
        align-items: stretch;
      }

      .section-head > .btn-secondary,
      .situation-top .btn-small {
        width: 100%;
      }

      .section-title-wrap {
        width: 100%;
      }

      .situation-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Прогрес підготовки</span>
          <span id="progressText">0 / 0</span>
        </div>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      </div>

    <div class="card">
      <div class="section">
        <div class="buttons">
          <button class="btn-secondary" id="checkAllBtn" type="button">Позначити все</button>
          <button class="btn-secondary" id="clearChecksBtn" type="button">Очистити позначки</button>
          <button class="btn-secondary" id="exportBtn" type="button">Експортувати JSON</button>
          <button class="btn-secondary" id="importBtn" type="button">Імпортувати JSON</button>
          <button class="btn-danger" id="clearBtn" type="button">Очистити все</button>
          <input id="importFileInput" type="file" accept="application/json,.json" style="display: none;" />
        </div>
      </div>
      <div class="section">
        <h2>1. Ядро сесії</h2>
        <div class="checklist">
          <label class="item"><input type="checkbox" data-id="session-goal"><span class="item-text"><span class="item-title">Визначити головну мету сесії</span><span class="item-note">Що саме має рухати події сьогодні.</span><textarea class="text-area" data-text-id="session-goal-text" placeholder="Наприклад:&#10;Гравці повинні знайти зниклого мага.&#10;Паралельно вони мають вирішити, чи довіряти місцевому барону."></textarea></span></label>
          <label class="item"><input type="checkbox" data-id="main-conflict"><span class="item-text"><span class="item-title">Сформулювати основний конфлікт</span><span class="item-note">Хто або що створює проблему для гравців.</span><input class="text-input" type="text" data-text-id="main-conflict-text" placeholder="Хто антагоніст або проблема" /></span></label>
          <label class="item"><input type="checkbox" data-id="key-scenes"><span class="item-text"><span class="item-title">Підготувати 2–3 ключові сцени</span><span class="item-note">Не жорсткий сюжет, а сильні моменти, які можуть відбутися.</span></span></label>
        </div>
      </div>

      <div class="section">
        <div class="section-head">
          <h2>2. Сцени</h2>
          <button class="btn-secondary" id="addSituationBtn" type="button">Додати сцену</button>
        </div>
        <div class="situations-list" id="situationsList"></div>

        <template id="situationTemplate">
          <div class="situation-card">
            <div class="situation-top">
              <div class="situation-top-left">
                <div class="item-title">Сцена <span data-role="situation-number"></span></div>
                <div class="item-note">Окремий блок для сцени або вузла сюжету. Тут можна описати локацію, NPC, цілі, ставки, підказки й ускладнення.</div>
              </div>
              <button class="btn-danger btn-small" type="button" data-action="remove-situation">Видалити</button>
            </div>

            <div class="situation-grid">
              <label class="item sub-item">
                <input type="checkbox" data-situation-check="summary" />
                <span class="item-text">
                  <span class="item-title">Суть сцени</span>
                  <span class="item-note">Що відбувається, у чому напруга, чому це важливо.</span>
                  <textarea class="text-area" data-situation-text="summary" placeholder="Коротко опиши сцену в кілька рядків."></textarea>
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="goal" />
                <span class="item-text">
                  <span class="item-title">Мета гравців</span>
                  <span class="item-note">Чого персонажі хочуть досягти в цій сцені.</span>
                  <input class="text-input" type="text" data-situation-text="goal" placeholder="Наприклад: дістати ключ, переконати барона, вижити в засідці" />
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="stakes" />
                <span class="item-text">
                  <span class="item-title">Ставки</span>
                  <span class="item-note">Що буде, якщо герої виграють або програють.</span>
                  <textarea class="text-area" data-situation-text="stakes" placeholder="Опиши, що станеться при успіху і при провалі."></textarea>
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="location" />
                <span class="item-text">
                  <span class="item-title">Локація</span>
                  <span class="item-note">Де це відбувається.</span>
                  <input class="text-input" type="text" data-situation-text="location" placeholder="Наприклад: стара вежа, ринок, катакомби" />
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="npcs" />
                <span class="item-text">
                  <span class="item-title">NPC / фракції</span>
                  <span class="item-note">Хто бере участь у сцені.</span>
                  <textarea class="text-area" data-situation-text="npcs" placeholder="Наприклад:&#10;Барон Едмонд — хоче приховати правду.&#10;Шпигун гільдії — стежить за героями.&#10;Культисти — готують ритуал."></textarea>
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="trigger" />
                <span class="item-text">
                  <span class="item-title">Тригер входу</span>
                  <span class="item-note">Що запускає цю сцену або як герої в неї потрапляють.</span>
                  <input class="text-input" type="text" data-situation-text="trigger" placeholder="Наприклад: лист, засідка, прохання NPC, знайдений слід" />
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="obstacles" />
                <span class="item-text">
                  <span class="item-title">Перешкоди</span>
                  <span class="item-note">Що ускладнює проходження сцени.</span>
                  <textarea class="text-area" data-situation-text="obstacles" placeholder="Опиши ворогів, пастки, таймер, соціальний тиск або інші проблеми."></textarea>
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="fail-forward" />
                <span class="item-text">
                  <span class="item-title">Наслідки провалу</span>
                  <span class="item-note">Що буде, якщо все піде не так.</span>
                  <input class="text-input" type="text" data-situation-text="fail-forward" placeholder="Наприклад: ворог втече, але залишить підказку" />
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="choices" />
                <span class="item-text">
                  <span class="item-title">Неочевидні рішення гравців</span>
                  <span class="item-note">Які альтернативні ходи вони можуть обрати.</span>
                  <input class="text-input" type="text" data-situation-text="choices" placeholder="Наприклад: підкуп, союз, обхідний шлях" />
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="clues" />
                <span class="item-text">
                  <span class="item-title">Підказки</span>
                  <span class="item-note">Яку інформацію тут можуть отримати гравці.</span>
                  <textarea class="text-area" data-situation-text="clues" placeholder="Запиши підказки, сліди, натяки або докази."></textarea>
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="reward" />
                <span class="item-text">
                  <span class="item-title">Нагорода / результат</span>
                  <span class="item-note">Що гравці отримають, якщо успішно впораються.</span>
                  <input class="text-input" type="text" data-situation-text="reward" placeholder="Наприклад: союзник, карта, магічний предмет, нова інформація" />
                </span>
              </label>

              <label class="item sub-item">
                <input type="checkbox" data-situation-check="twist" />
                <span class="item-text">
                  <span class="item-title">Секрет / твіст</span>
                  <span class="item-note">Що може різко ускладнити або змінити сцену.</span>
                  <input class="text-input" type="text" data-situation-text="twist" placeholder="Наприклад: союзник уже працює на ворога" />
                </span>
              </label>
            </div>
          </div>
        </template>
      </div>

      <div class="section">
        <h2>3. NPC і фракції</h2>
        <div class="checklist">
          <label class="item"><input type="checkbox" data-id="npc-goals"><span class="item-text"><span class="item-title">Дати важливим NPC чіткі цілі</span><span class="item-note">Кожен важливий NPC має чогось хотіти.</span></span></label>
          <label class="item"><input type="checkbox" data-id="npc-personality"><span class="item-text"><span class="item-title">Записати короткі риси або манеру мови NPC</span><span class="item-note">Щоб їх було легко відігравати за столом.</span></span></label>
          <label class="item"><input type="checkbox" data-id="npc-reaction"><span class="item-text"><span class="item-title">Продумати реакцію NPC на дії гравців</span><span class="item-note">Хто допоможе, хто зрадить, хто втече.</span></span></label>
        </div>
      </div>

      <div class="section">
        <h2>4. Контент сесії</h2>
        <div class="checklist">
          <label class="item"><input type="checkbox" data-id="social-scene"><span class="item-text"><span class="item-title">Підготувати соціальну сцену</span><span class="item-note">Переговори, допит, торг, суперечка або знайомство.</span></span></label>
          <label class="item"><input type="checkbox" data-id="exploration"><span class="item-text"><span class="item-title">Підготувати сцену дослідження</span><span class="item-note">Локація, загадка, сліди, пошук або пастка.</span></span></label>
          <label class="item"><input type="checkbox" data-id="combat"><span class="item-text"><span class="item-title">Підготувати бій або іншу сцену напруги</span><span class="item-note">Не обов’язково бій, але має бути ризик і тиск.</span></span></label>
          <label class="item"><input type="checkbox" data-id="reward"><span class="item-text"><span class="item-title">Визначити нагороду</span><span class="item-note">Інформація, предмет, союзник, доступ до нової локації.</span></span></label>
        </div>
      </div>
    </div>
  </div>

  <script>
    const fileId = encodeURIComponent(window.location.pathname);
    const STORAGE_KEY = `dm-session-prep-${fileId}`;

    const progressText = document.getElementById('progressText');
    const progressFill = document.getElementById('progressFill');
    const clearBtn = document.getElementById('clearBtn');
    const clearChecksBtn = document.getElementById('clearChecksBtn');
    const checkAllBtn = document.getElementById('checkAllBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const importFileInput = document.getElementById('importFileInput');
    const addSituationBtn = document.getElementById('addSituationBtn');
    const situationsList = document.getElementById('situationsList');
    const situationTemplate = document.getElementById('situationTemplate');

    function getStaticCheckboxes() {
      return Array.from(document.querySelectorAll('input[type="checkbox"][data-id]'));
    }

    function getStaticTextInputs() {
      return Array.from(document.querySelectorAll('[data-text-id]'));
    }

    function getAllCheckboxes() {
      return Array.from(document.querySelectorAll('input[type="checkbox"][data-id], input[type="checkbox"][data-situation-check]'));
    }

    function getAllTextInputs() {
      return Array.from(document.querySelectorAll('[data-text-id], [data-situation-text]'));
    }

    function getUiState() {
      const sections = {};
      document.querySelectorAll('.section').forEach((section, index) => {
        const key = section.dataset.sectionKey || `section-${index}`;
        sections[key] = section.classList.contains('is-collapsed');
      });

      const items = {};
      document.querySelectorAll('.item[data-item-key]').forEach((item) => {
        items[item.dataset.itemKey] = item.classList.contains('is-collapsed');
      });

      return { sections, items };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    function getSituationsState() {
      return Array.from(situationsList.querySelectorAll('.situation-card')).map((card) => {
        const checks = {};
        const texts = {};

        card.querySelectorAll('[data-situation-check]').forEach((checkbox) => {
          checks[checkbox.dataset.situationCheck] = checkbox.checked;
        });

        card.querySelectorAll('[data-situation-text]').forEach((input) => {
          texts[input.dataset.situationText] = input.value;
        });

        return { checks, texts };
      });
    }

    function getCurrentState() {
      const state = {};

      getStaticCheckboxes().forEach((checkbox) => {
        state[checkbox.dataset.id] = checkbox.checked;
      });

      getStaticTextInputs().forEach((input) => {
        state[input.dataset.textId] = input.value;
      });

      state.situations = getSituationsState();
      state.ui = getUiState();
      return state;
    }

    function renumberSituations() {
      Array.from(situationsList.querySelectorAll('.situation-card')).forEach((card, index) => {
        const numberEl = card.querySelector('[data-role="situation-number"]');
        if (numberEl) numberEl.textContent = index + 1;
      });
      assignItemKeys();
    }

    function assignItemKeys() {
      document.querySelectorAll('.checklist > .item').forEach((item, index) => {
        item.dataset.itemKey = `static-${index}`;
      });

      situationsList.querySelectorAll('.situation-card').forEach((card, sceneIndex) => {
        card.querySelectorAll('.item.sub-item').forEach((item, itemIndex) => {
          item.dataset.itemKey = `scene-${sceneIndex}-${itemIndex}`;
        });
      });
    }

    function createItemToggle(item) {
      if (item.querySelector('.item-toggle')) return;
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'item-toggle';
      button.setAttribute('aria-label', 'Згорнути пункт');
      button.textContent = '−';
      button.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        item.classList.toggle('is-collapsed');
        button.textContent = item.classList.contains('is-collapsed') ? '+' : '−';
        button.setAttribute('aria-label', item.classList.contains('is-collapsed') ? 'Розгорнути пункт' : 'Згорнути пункт');
        saveState();
      });
      item.appendChild(button);
    }

    function applyUiState(uiState = {}) {
      const sectionsState = uiState.sections && typeof uiState.sections === 'object' ? uiState.sections : {};
      const itemsState = uiState.items && typeof uiState.items === 'object' ? uiState.items : {};

      document.querySelectorAll('.section').forEach((section, index) => {
        const key = section.dataset.sectionKey || `section-${index}`;
        const collapsed = Boolean(sectionsState[key]);
        section.classList.toggle('is-collapsed', collapsed);
        const toggle = section.querySelector('.section-toggle');
        if (toggle) {
          toggle.textContent = collapsed ? '+' : '−';
          toggle.setAttribute('aria-label', collapsed ? 'Розгорнути блок' : 'Згорнути блок');
        }
      });

      document.querySelectorAll('.item[data-item-key]').forEach((item) => {
        const collapsed = Boolean(itemsState[item.dataset.itemKey]);
        item.classList.toggle('is-collapsed', collapsed);
        const toggle = item.querySelector('.item-toggle');
        if (toggle) {
          toggle.textContent = collapsed ? '+' : '−';
          toggle.setAttribute('aria-label', collapsed ? 'Розгорнути пункт' : 'Згорнути пункт');
        }
      });
    }

    function enhanceSections() {
      document.querySelectorAll('.section').forEach((section, index) => {
        section.dataset.sectionKey = `section-${index}`;

        let head = section.querySelector(':scope > .section-head');
        if (!head) {
          const h2 = section.querySelector(':scope > h2');
          if (!h2) return;
          head = document.createElement('div');
          head.className = 'section-head';
          const titleWrap = document.createElement('div');
          titleWrap.className = 'section-title-wrap';
          h2.parentNode.insertBefore(head, h2);
          titleWrap.appendChild(h2);
          head.appendChild(titleWrap);
        } else if (!head.querySelector('.section-title-wrap')) {
          const h2 = head.querySelector('h2');
          if (h2) {
            const titleWrap = document.createElement('div');
            titleWrap.className = 'section-title-wrap';
            h2.parentNode.insertBefore(titleWrap, h2);
            titleWrap.appendChild(h2);
          }
        }

        if (!head.querySelector('.section-toggle')) {
          const titleWrap = head.querySelector('.section-title-wrap') || head;
          const toggle = document.createElement('button');
          toggle.type = 'button';
          toggle.className = 'section-toggle';
          toggle.textContent = '−';
          toggle.setAttribute('aria-label', 'Згорнути блок');
          toggle.addEventListener('click', () => {
            section.classList.toggle('is-collapsed');
            toggle.textContent = section.classList.contains('is-collapsed') ? '+' : '−';
            toggle.setAttribute('aria-label', section.classList.contains('is-collapsed') ? 'Розгорнути блок' : 'Згорнути блок');
            saveState();
          });
          titleWrap.prepend(toggle);
        }

        let body = section.querySelector(':scope > .section-body');
        if (!body) {
          body = document.createElement('div');
          body.className = 'section-body';
          const children = Array.from(section.children).filter((child) => child !== head);
          children.forEach((child) => body.appendChild(child));
          section.appendChild(body);
        }
      });
    }

    function enhanceItems() {
      assignItemKeys();
      document.querySelectorAll('.item').forEach((item) => createItemToggle(item));
    }

    function bindSituationCard(card) {
      card.querySelectorAll('[data-situation-check]').forEach((checkbox) => {
        checkbox.addEventListener('change', saveState);
      });

      card.querySelectorAll('[data-situation-text]').forEach((input) => {
        input.addEventListener('input', saveState);
      });

      const removeBtn = card.querySelector('[data-action="remove-situation"]');
      if (removeBtn) {
        removeBtn.addEventListener('click', () => {
          card.remove();
          if (!situationsList.querySelector('.situation-card')) {
            createSituationCard();
          }
          renumberSituations();
          enhanceItems();
          saveState();
        });
      }
    }

    function createSituationCard(data = {}) {
      const fragment = situationTemplate.content.cloneNode(true);
      const card = fragment.querySelector('.situation-card');
      const checks = data.checks && typeof data.checks === 'object' ? data.checks : {};
      const texts = data.texts && typeof data.texts === 'object' ? data.texts : {};

      card.querySelectorAll('[data-situation-check]').forEach((checkbox) => {
        checkbox.checked = Boolean(checks[checkbox.dataset.situationCheck]);
      });

      card.querySelectorAll('[data-situation-text]').forEach((input) => {
        input.value = typeof texts[input.dataset.situationText] === 'string' ? texts[input.dataset.situationText] : '';
      });

      bindSituationCard(card);
      situationsList.appendChild(card);
      renumberSituations();
      enhanceItems();
      updateUI();
      return card;
    }

    function setSituationsState(items) {
      situationsList.innerHTML = '';
      const list = Array.isArray(items) ? items : [];

      if (list.length === 0) {
        createSituationCard();
        return;
      }

      list.forEach((item) => createSituationCard(item));
    }

    function setState(state) {
      const safeState = state && typeof state === 'object' ? state : {};

      getStaticCheckboxes().forEach((checkbox) => {
        checkbox.checked = Boolean(safeState[checkbox.dataset.id]);
      });

      getStaticTextInputs().forEach((input) => {
        input.value = typeof safeState[input.dataset.textId] === 'string' ? safeState[input.dataset.textId] : '';
      });

      setSituationsState(safeState.situations);
      enhanceItems();
      applyUiState(safeState.ui);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getCurrentState()));
      updateUI();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getCurrentState()));
      updateUI();
    }

    function updateUI() {
      const checkboxes = getAllCheckboxes();
      const total = checkboxes.length;
      const completed = checkboxes.filter((checkbox) => checkbox.checked).length;
      const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

      progressText.textContent = `${completed} / ${total}`;
      progressFill.style.width = `${percent}%`;

      document.querySelectorAll('.item, .situation-card').forEach((el) => {
        el.classList.remove('done');
      });

      checkboxes.forEach((checkbox) => {
        const label = checkbox.closest('.item');
        if (label) {
          label.classList.toggle('done', checkbox.checked);
        }
      });

      situationsList.querySelectorAll('.situation-card').forEach((card) => {
        const cardChecks = Array.from(card.querySelectorAll('[data-situation-check]'));
        const allChecked = cardChecks.length > 0 && cardChecks.every((checkbox) => checkbox.checked);
        card.classList.toggle('done', allChecked);
      });

      checkAllBtn.textContent = completed === total ? 'Зняти всі позначки' : 'Позначити все';
    }

    function applySavedState() {
      setState(loadState());
    }

    enhanceSections();
    enhanceItems();

    getStaticCheckboxes().forEach((checkbox) => {
      checkbox.addEventListener('change', saveState);
    });

    getStaticTextInputs().forEach((input) => {
      input.addEventListener('input', saveState);
    });

    clearChecksBtn.addEventListener('click', () => {
      getAllCheckboxes().forEach((checkbox) => {
        checkbox.checked = false;
      });
      saveState();
    });

    clearBtn.addEventListener('click', () => {
      getAllCheckboxes().forEach((checkbox) => {
        checkbox.checked = false;
      });

      getAllTextInputs().forEach((input) => {
        input.value = '';
      });

      situationsList.innerHTML = '';
      createSituationCard();
      applyUiState({});
      localStorage.removeItem(STORAGE_KEY);
      saveState();
    });

    checkAllBtn.addEventListener('click', () => {
      const checkboxes = getAllCheckboxes();
      const allChecked = checkboxes.length > 0 && checkboxes.every((checkbox) => checkbox.checked);

      checkboxes.forEach((checkbox) => {
        checkbox.checked = !allChecked;
      });

      saveState();
    });

    addSituationBtn.addEventListener('click', () => {
      createSituationCard();
      saveState();
    });

    exportBtn.addEventListener('click', () => {
      const exportData = {
        version: 3,
        exportedAt: new Date().toISOString(),
        data: getCurrentState()
      };

      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const safeName = (document.title || 'dm-session-prep').replace(/[\/:*?"<>|]+/g, '-').trim() || 'dm-session-prep';

      link.href = url;
      link.download = `${safeName}.json`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    });

    importBtn.addEventListener('click', () => {
      importFileInput.click();
    });

    importFileInput.addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const importedState = parsed && typeof parsed === 'object' && parsed.data && typeof parsed.data === 'object'
          ? parsed.data
          : parsed;

        setState(importedState);
      } catch {
        alert('Не вдалося імпортувати JSON. Перевір, чи файл має коректний формат.');
      } finally {
        importFileInput.value = '';
      }
    });

    applySavedState();
  </script>
</body>
</html>
